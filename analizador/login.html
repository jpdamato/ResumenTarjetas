<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entrar · Resumen de tarjetas</title>
<style>
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb; --plane: #f9f9f7;
    --text-primary: #0b0b0b; --text-secondary: #52514e; --muted: #898781;
    --border: rgba(11,11,11,0.10); --axis: #c3c2b7;
    --series-1: #2a78d6; --critical: #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --surface-1: #1a1a19; --plane: #0d0d0d;
      --text-primary: #ffffff; --text-secondary: #c3c2b7; --muted: #898781;
      --border: rgba(255,255,255,0.10); --axis: #383835; --series-1: #3987e5;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 24px;
    background: var(--plane); color: var(--text-primary);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .caja {
    width: 100%; max-width: 380px; background: var(--surface-1);
    border: 1px solid var(--border); border-radius: 14px; padding: 26px 24px;
  }
  h1 { font-size: 19px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
  p.sub { color: var(--text-secondary); font-size: 13px; margin: 0 0 20px; }
  .tabs { display: flex; border: 1px solid var(--border); border-radius: 9px;
          overflow: hidden; margin-bottom: 18px; }
  .tabs a { flex: 1; text-align: center; padding: 8px; font-size: 13px;
            text-decoration: none; color: var(--text-secondary); background: var(--surface-1); }
  .tabs a.on { background: var(--series-1); color: #fff; }
  label { display: block; font-size: 11px; color: var(--muted);
          text-transform: uppercase; letter-spacing: .04em; margin: 0 0 4px; }
  input {
    font: inherit; width: 100%; color: var(--text-primary); background: var(--plane);
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px;
    margin-bottom: 14px;
  }
  input:focus { outline: 2px solid var(--series-1); outline-offset: -1px; }
  button {
    font: inherit; width: 100%; cursor: pointer; padding: 10px;
    background: var(--series-1); color: #fff; border: 0; border-radius: 8px;
    font-weight: 600;
  }
  .error {
    margin: 0 0 16px; padding: 9px 12px; border-radius: 9px; font-size: 13px;
    border: 1px solid var(--critical); color: var(--critical);
    background: color-mix(in srgb, var(--critical) 8%, var(--surface-1));
  }
  .nota { margin: 16px 0 0; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
  <div class="caja">
    <h1>Resumen de tarjetas</h1>
    <p class="sub">Cada usuario ve solamente sus propios resúmenes.</p>

    __TABS__
    __ERROR__

    <form method="post" action="__ACCION__">
      <input type="hidden" name="proximo" value="__PROXIMO__">
      <label for="usuario">Usuario</label>
      <input id="usuario" name="usuario" autocomplete="username" autofocus
             required maxlength="32" value="__USUARIO__">
      <label for="clave">Contraseña</label>
      <input id="clave" name="clave" type="password" required
             autocomplete="__AUTOCOMPLETE__">
      <button type="submit">__BOTON__</button>
    </form>

    <p class="nota">__NOTA__</p>
  </div>
</body>
</html>
